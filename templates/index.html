<!DOCTYPE html>
<html>
<head>
    <title>Chatbot FAQ</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f4f4;
        }

        h1 {
            color: #333;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        button {
            width: 90%;
            max-width: 300px;
            height: 60px;
            font-size: 18px;
            margin: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>🤖 Chatbot FAQ</h1>
    <p>Choisissez une question :</p>

    <div class="container">
        <form method="post">
            <button name="question" value="horaires">⏰ Quels sont vos horaires ?</button>
            <button name="question" value="contact">📞 Comment vous contacter ?</button>
            <button name="question" value="adresse">📍 Où êtes-vous situés ?</button>
            <button name="question" value="services">💼 Quels sont vos services ?</button>
        </form>
    </div>

    <div class="result">
        {{ result }}
    </div>

</body>
</html>
