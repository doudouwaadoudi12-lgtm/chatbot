<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chatbot</title>

<style>
body {
    font-family: Arial;
    background: #ece5dd;
    margin: 0;
}

.header {
    background: #075e54;
    color: white;
    padding: 15px;
    font-size: 18px;
}

.chat-box {
    height: 70vh;
    overflow-y: auto;
    padding: 10px;
}

.message {
    max-width: 70%;
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
}

.user {
    background: #dcf8c6;
    margin-left: auto;
}

.bot {
    background: white;
}

/* Questions buttons */
.questions {
    padding: 10px;
    background: #f0f0f0;
}

.questions button {
    margin: 5px;
    padding: 10px;
    border: none;
    background: #075e54;
    color: white;
    border-radius: 20px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="header">
    🤖 Chatbot Assistant
</div>

<div class="chat-box" id="chat-box"></div>

<div class="questions">
    <button onclick="sendQuestion('Quels sont vos horaires ?')">Horaires</button>
    <button onclick="sendQuestion('Quels services proposez-vous ?')">Services</button>
    <button onclick="sendQuestion('Comment vous contacter ?')">Contact</button>
</div>

<script>
function addMessage(text, type) {
    let msg = document.createElement("div");
    msg.classList.add("message", type);
    msg.innerText = text;
    document.getElementById("chat-box").appendChild(msg);
}

function sendQuestion(question) {
    addMessage(question, "user");

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: question})
    })
    .then(res => res.json())
    .then(data => {
        addMessage(data.response, "bot");
    });
}
</script>

</body>
</html>
